<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant multi-color gradient background (darkened) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="30%" style="stop-color:#7e22ce"/>
      <stop offset="60%" style="stop-color:#be185d"/>
      <stop offset="85%" style="stop-color:#c2410c"/>
      <stop offset="100%" style="stop-color:#a16207"/>
    </linearGradient>
    <!-- Accent gradient for the "A" letter (darkened) -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <!-- Gradient for the dollar sign accent (darkened) -->
    <linearGradient id="dollarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ca8a04"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <!-- Decorative sparkle gradient -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff; stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background with multi-color gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner glow overlay for depth -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#sparkle)" opacity="0.15"/>
  <!-- Stylized "AE" letters with warm gradient -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="240" font-weight="bold" fill="url(#letterGrad)" letter-spacing="-10">AE</text>
  <!-- Decorative sparkle dots for extra color pop -->
  <circle cx="120" cy="120" r="8" fill="white" opacity="0.5"/>
  <circle cx="400" cy="140" r="5" fill="#ca8a04" opacity="0.6"/>
  <circle cx="380" cy="420" r="6" fill="white" opacity="0.4"/>
  <circle cx="140" cy="400" r="4" fill="#ca8a04" opacity="0.5"/>
</svg>
