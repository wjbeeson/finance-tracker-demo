<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant multi-color gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="30%" style="stop-color:#a855f7"/>
      <stop offset="60%" style="stop-color:#ec4899"/>
      <stop offset="85%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <!-- Accent gradient for the "A" letter -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <!-- Gradient for the dollar sign accent -->
    <linearGradient id="dollarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <!-- Decorative sparkle gradient -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff; stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background with multi-color gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner glow overlay for depth -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#sparkle)" opacity="0.15"/>
  <!-- Stylized "A" letter with warm gradient -->
  <path d="M256 100 L370 400 L330 400 L300 320 L212 320 L182 400 L142 400 Z M256 180 L224 296 L288 296 Z" fill="url(#letterGrad)"/>
  <!-- Small dollar sign accent inside the A -->
  <line x1="256" y1="230" x2="256" y2="290" stroke="url(#dollarGrad)" stroke-width="4" opacity="0.7"/>
  <path d="M242 248 Q242 240 256 240 Q270 240 270 248 Q270 256 256 256 Q242 256 242 264 Q242 272 256 272 Q270 272 270 264" fill="none" stroke="url(#dollarGrad)" stroke-width="3.5" opacity="0.7"/>
  <!-- Decorative sparkle dots for extra color pop -->
  <circle cx="120" cy="120" r="8" fill="white" opacity="0.5"/>
  <circle cx="400" cy="140" r="5" fill="#fde68a" opacity="0.6"/>
  <circle cx="380" cy="420" r="6" fill="white" opacity="0.4"/>
  <circle cx="140" cy="400" r="4" fill="#fde68a" opacity="0.5"/>
</svg>
