name: Junie Jira Wrap-up

on:
  pull_request:
    types: [closed]

jobs:
  junie-agent-resolve:
    # Crucial: Only run if the PR was actually merged, not just closed/abandoned!
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run Junie Resolution Summary
        uses: JetBrains/junie-github-action@v0
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          prompt: |
            STRICT RULES — READ BEFORE DOING ANYTHING:
            - Do NOT explore the repository file structure.
            - Do NOT open or read source code files directly.
            - Do NOT use any MCP tools. Use curl commands for all API interactions.
            - Execute ONLY the numbered steps below.
            - After completing the final step, IMMEDIATELY STOP.
            
            ENVIRONMENT CONTEXT:
            - PR Number: '${{ github.event.pull_request.number }}'
            - Branch Name / Jira Ticket ID: '${{ github.event.pull_request.head.ref }}'
            - Repository: '${{ github.repository }}'
            You have access to `curl` and `jq` for API calls.
            
            YOUR MISSION — execute this exact sequence:
            
            1. Fetch the PR description and diff using curl:
               curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}"
               
               For the diff:
               curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3.diff" \
                 "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}"
            
            2. Based on the diff and PR description, generate a concise, business-friendly "Release Summary" explaining what was actually built and merged.
            
            3. Post a comment to the Jira ticket '${{ github.event.pull_request.head.ref }}' with the release summary:
               curl -s -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
                 -X POST \
                 -H "Content-Type: application/json" \
                 -d '{"body": {"type": "doc", "version": 1, "content": [{"type": "paragraph", "content": [{"type": "text", "text": "🚀 PR Merged & Resolved by Junie\n\nRelease Summary:\n<your summary here>"}]}]}}' \
                 "$JIRA_URL/rest/api/3/issue/${{ github.event.pull_request.head.ref }}/comment"
            
            4. Transition the Jira ticket to "Done" status. First, get available transitions:
               curl -s -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
                 "$JIRA_URL/rest/api/2/issue/${{ github.event.pull_request.head.ref }}/transitions"
               
               Then transition to "Done" using the transition ID from the response:
               curl -s -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
                 -X POST \
                 -H "Content-Type: application/json" \
                 -d '{"transition": {"id": "<DONE_TRANSITION_ID>"}}' \
                 "$JIRA_URL/rest/api/2/issue/${{ github.event.pull_request.head.ref }}/transitions"
            
            5. IMMEDIATELY STOP AND EXIT. Do nothing else.
