name: Junie PR Builder

on:
  workflow_run:
    workflows: ["Python Backend Tests"]
    types:
      - completed

jobs:
  junie-agent-review:
    # Force stop if it hangs for more than 5 minutes
    timeout-minutes: 10

    # Only run if the commit message contains @junie-agent
    if: contains(github.event.workflow_run.head_commit.message, '@junie-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ensure PR exists
        id: ensure_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"

          # Check for existing open PR
          PR_NUMBER=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls?head=$OWNER:$BRANCH&state=open" \
            | jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            echo "Found existing PR #$PR_NUMBER"
          else
            # Create a new PR
            PR_NUMBER=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"$BRANCH: Automated PR\",\"head\":\"$BRANCH\",\"base\":\"master\",\"body\":\"Automated PR for branch \`$BRANCH\`. Description will be updated by Junie.\"}" \
              "https://api.github.com/repos/$REPO/pulls" \
              | jq '.number')
            echo "Created new PR #$PR_NUMBER"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Run Junie Analysis
        uses: JetBrains/junie-github-action@v0
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          silent_mode: "true"
          prompt: |
            STRICT RULES — READ BEFORE DOING ANYTHING:
            - Do NOT explore the repository file structure (no `ls`, `find`, `cat` on repo files).
            - Do NOT open or read workflow YAML files, Dockerfiles, config files, or any source code files.
            - Do NOT investigate the CI/CD environment, installed tools, or system setup.
            - Do NOT verify or second-guess the test results provided below — they are authoritative.
            - Execute ONLY the numbered steps below. Do not add, skip, or reorder steps.
            - After completing the final step, IMMEDIATELY STOP. Do not perform any additional analysis.
            
            ENVIRONMENT CONTEXT:
            You are executing in a GitHub Actions runner. You have access to:
            - `curl` and `jq` for GitHub API calls. Use the `$GITHUB_TOKEN` environment variable for Authorization.
            - Standard Git commands (`git diff`, `git log`).
            Do NOT attempt to use the `gh` CLI tool.
            Do NOT use any MCP tools. Use curl commands for all API interactions.
            
            PRE-RESOLVED CONTEXT (do not re-derive these values):
            - Repository: '${{ github.repository }}'
            - Branch: '${{ github.event.workflow_run.head_branch }}'
            - Commit SHA: '${{ github.event.workflow_run.head_sha }}'
            - Test result: '${{ github.event.workflow_run.conclusion }}'
            - PR Number: '${{ steps.ensure_pr.outputs.pr_number }}'
            - The branch name IS the Jira ticket ID (e.g., `FT-42`). Jira project space key: "FT".
            
            CRITICAL: A Pull Request already exists (PR #${{ steps.ensure_pr.outputs.pr_number }}). Do NOT create a new PR. Use the PR number above for all operations.
            
            YOUR MISSION — execute this exact sequence:
            
            1. Run `git diff origin/master..HEAD` to get the code changes.
            
            2. Update the PR description using `curl -X PATCH` with a detailed summary of the code changes from step 1:
               curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d '{"body": "<your summary>"}' \
                 "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.ensure_pr.outputs.pr_number }}"
            
            3. Check the test result: The value is '${{ github.event.workflow_run.conclusion }}' (already provided above). Do NOT query any API to re-check this — use this value directly.
            
            4. If test result is 'failure':
               a. Fetch the check runs for the commit to find the failed check run ID:
                  curl -s -H "Authorization: token $GITHUB_TOKEN" \
                    "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/check-runs"
               b. Fetch the failure logs using the check run ID from step 4a:
                  curl -s -H "Authorization: token $GITHUB_TOKEN" \
                    "https://api.github.com/repos/${{ github.repository }}/check-runs/<CHECK_RUN_ID>/annotations"
               c. Post a PR comment explaining where the tests failed and suggest a fix:
                  curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d '{"body": "<your comment>"}' \
                    "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.ensure_pr.outputs.pr_number }}/comments"
               d. IMMEDIATELY STOP AND EXIT. Do nothing else.
            
            5. If test result is 'success', perform the Acceptance Criteria Review:
               a. Fetch the Jira ticket details including acceptance criteria:
                  curl -s -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
                    "$JIRA_URL/rest/api/2/issue/${{ github.event.workflow_run.head_branch }}"
               b. Run `git log origin/master..HEAD --pretty=format:"%h %s"` to get the commit history.
               c. Cross-reference the commit history and code diff (from step 1) against the acceptance criteria.
               d. Compose and post a PR comment using the following curl command with this structure:
                  curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d '{"body": "<your composed comment>"}' \
                    "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.ensure_pr.outputs.pr_number }}/comments"
                  The comment should follow this structure:
                  ---
                  ## ✅ Tests Passed — Acceptance Criteria Review
                  
                  **Jira Ticket:** [<TICKET-ID>](<link to ticket>)
                  
                  ### Acceptance Criteria Assessment
                  For each acceptance criterion from the ticket, list:
                  - The criterion text
                  - ✅ **Met** / ❌ **Not Met** / ⚠️ **Partially Met**
                  - A brief explanation referencing specific commits or code changes
                  
                  ### Commit History
                  List all commits on this branch.
                  
                  ### Summary
                  An overall verdict: are all acceptance criteria fully met?
                  ---
               e. IMMEDIATELY STOP AND EXIT. Do nothing else.
