name: Junie PR Builder

on:
  workflow_run:
    workflows: ["Python Backend Tests"]
    types:
      - completed

jobs:
  junie-agent-review:
    timeout-minutes: 10

    # Only run if the commit message contains @junie-agent
    if: contains(github.event.workflow_run.head_commit.message, '@junie-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ensure PR exists
        id: ensure_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"

          # Check for existing open PR
          PR_NUMBER=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls?head=$OWNER:$BRANCH&state=open" \
            | jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            echo "Found existing PR #$PR_NUMBER"
          else
            # Create a new PR
            PR_NUMBER=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"$BRANCH: Automated PR\",\"head\":\"$BRANCH\",\"base\":\"master\",\"body\":\"Automated PR for branch \`$BRANCH\`. Description will be updated shortly.\"}" \
              "https://api.github.com/repos/$REPO/pulls" \
              | jq '.number')
            echo "Created new PR #$PR_NUMBER"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Extract Jira Ticket
        id: jira_ticket
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          # Try branch name first
          TICKET=$(echo "$BRANCH" | grep -oE 'FT-[0-9]+' || true)

          # Fallback: extract from PR title
          if [ -z "$TICKET" ]; then
            PR_TITLE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.ensure_pr.outputs.pr_number }}" \
              | jq -r '.title')
            TICKET=$(echo "$PR_TITLE" | grep -oE 'FT-[0-9]+' || true)
          fi

          # Fallback: extract from head commit message
          if [ -z "$TICKET" ]; then
            TICKET=$(echo "${{ github.event.workflow_run.head_commit.message }}" \
              | grep -oE 'FT-[0-9]+' || true)
          fi

          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Resolved Jira ticket: ${TICKET:-NONE}"

      - name: Gather diff
        id: diff
        shell: bash
        run: |
          git diff origin/master..HEAD > /tmp/diff.txt
          echo "path=/tmp/diff.txt" >> "$GITHUB_OUTPUT"
          echo "Diff size: $(wc -l < /tmp/diff.txt) lines"

      - name: Gather commit log
        id: commits
        shell: bash
        run: |
          git log origin/master..HEAD --pretty=format:"%h %s" > /tmp/commits.txt
          echo "path=/tmp/commits.txt" >> "$GITHUB_OUTPUT"

      - name: Update PR description (procedural)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TICKET="${{ steps.jira_ticket.outputs.ticket }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          {
            echo "Automated PR for branch $BRANCH."
            if [ -n "$TICKET" ]; then
              echo ""
              echo "Jira Ticket: $TICKET"
            fi
          } > /tmp/pr_body.txt

          jq -n --rawfile body /tmp/pr_body.txt '{"body": $body}' | \
            curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.ensure_pr.outputs.pr_number }}"

      # === FAILURE PATH ===

      - name: Fetch test failure annotations
        id: failures
        if: github.event.workflow_run.conclusion == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          CHECK_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/check-runs" \
            | jq '[.check_runs[] | select(.conclusion=="failure")][0].id')

          if [ "$CHECK_ID" != "null" ] && [ -n "$CHECK_ID" ]; then
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/check-runs/$CHECK_ID/annotations" \
              > /tmp/annotations.txt
          else
            echo "No failed check run annotations found." > /tmp/annotations.txt
          fi
          echo "path=/tmp/annotations.txt" >> "$GITHUB_OUTPUT"

      - name: Junie — Failure Diagnosis
        if: github.event.workflow_run.conclusion == 'failure'
        uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          silent_mode: "true"
          prompt: |
            You are given a diff and test failure annotations as files.
            Your ONLY job: explain what failed and suggest a fix.

            DIFF: Read the file at /tmp/diff.txt
            ANNOTATIONS: Read the file at /tmp/annotations.txt

            OUTPUT: Write your analysis to /tmp/failure_comment.txt in GitHub-Flavored Markdown.
            Use ## for headings, **bold** for emphasis, ` for inline code, ``` for code blocks, and - for bullet lists.
            Do nothing else — no API calls, no exploring files, no MCP tools. Just read, analyze, and write.

      - name: Post failure comment
        if: github.event.workflow_run.conclusion == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -f /tmp/failure_comment.txt ]; then
            BODY=$(cat /tmp/failure_comment.txt)
          else
            BODY="⚠️ Junie was unable to produce a failure diagnosis."
          fi
          jq -n --arg body "$BODY" '{"body": $body}' | \
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.ensure_pr.outputs.pr_number }}/comments"

      # === SUCCESS PATH ===

      - name: Fetch acceptance criteria
        id: criteria
        if: github.event.workflow_run.conclusion == 'success' && steps.jira_ticket.outputs.ticket != ''
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        shell: bash
        run: |
          TICKET="${{ steps.jira_ticket.outputs.ticket }}"
          curl -s -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
            "$JIRA_URL/rest/api/2/issue/$TICKET?fields=description,summary" \
            | jq -r '.fields.description // "No description found."' > /tmp/criteria.txt
          echo "path=/tmp/criteria.txt" >> "$GITHUB_OUTPUT"

      - name: Junie — Acceptance Criteria Review
        if: github.event.workflow_run.conclusion == 'success' && steps.jira_ticket.outputs.ticket != ''
        uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          silent_mode: "true"
          prompt: |
            You are given a diff, commit log, and acceptance criteria as files.
            Your ONLY job: write a single review comment with two parts.

            DIFF: Read the file at /tmp/diff.txt
            COMMITS: Read the file at /tmp/commits.txt
            ACCEPTANCE CRITERIA: Read the file at /tmp/criteria.txt

            OUTPUT: Write your review to /tmp/review.txt in GitHub-Flavored Markdown.
            Use ## for headings, ### for sub-headings, **bold** for emphasis, ` for inline code, ``` for code blocks, and - for bullet lists.

            TITLE — Choose based on your assessment:
            - If ALL criteria are ✅ Met: ## Acceptance Criteria Met ✅
            - If ANY criterion is ❌ or ⚠️: ## Acceptance Criteria Failed ❌

            Follow this EXACT structure (copy it, fill in the blanks):

            ---BEGIN TEMPLATE---
            **🟢 All tests passed** | **Jira Ticket:** [${{ steps.jira_ticket.outputs.ticket }}](${{ secrets.JIRA_URL }}/browse/${{ steps.jira_ticket.outputs.ticket }})

            ## Acceptance Criteria Met ✅
            _(or ## Acceptance Criteria Failed ❌)_

            ### Summary of Changes
            > A 1–2 sentence plain-language overview of what this PR does, suitable for a project manager.

            **Files changed:**
            - `path/to/file.ext` — What was changed and why
            - `path/to/other.ext` — What was changed and why
            _(one bullet per file touched in the diff; group trivial changes)_

            ### Acceptance Criteria

            ✅ **Criterion name or description**
            &nbsp;&nbsp;&nbsp;&nbsp;**MET:** One-line explanation of how the code satisfies this.

            ❌ **Criterion name or description**
            &nbsp;&nbsp;&nbsp;&nbsp;**NOT MET:** One-line explanation of what is missing or wrong.

            ⚠️ **Criterion name or description**
            &nbsp;&nbsp;&nbsp;&nbsp;**PARTIAL:** One-line explanation of what is done and what remains.

            _(Repeat for every criterion from the acceptance criteria file. Use ✅, ❌, or ⚠️ exactly as shown.)_
            ---END TEMPLATE---

            RULES:
            - Every criterion from the acceptance criteria file MUST appear — do not skip any.
            - Use the emoji + bold label format exactly: ✅ **MET:**, ❌ **NOT MET:**, ⚠️ **PARTIAL:**
            - Keep explanations to one sentence each.
            - Do nothing else — no API calls, no exploring files, no MCP tools. Just read, analyze, and write.

      - name: Post review comment
        if: github.event.workflow_run.conclusion == 'success' && steps.jira_ticket.outputs.ticket != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -f /tmp/review.txt ]; then
            BODY=$(cat /tmp/review.txt)
          else
            BODY="⚠️ Junie was unable to produce an acceptance criteria review."
          fi
          jq -n --arg body "$BODY" '{"body": $body}' | \
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.ensure_pr.outputs.pr_number }}/comments"

      - name: Post success comment (no Jira ticket)
        if: github.event.workflow_run.conclusion == 'success' && steps.jira_ticket.outputs.ticket == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          {
            echo "## ✅ Tests Passed"
            echo "No Jira ticket found for this branch — skipping acceptance criteria review."
          } > /tmp/no_ticket_comment.txt

          jq -n --rawfile body /tmp/no_ticket_comment.txt '{"body": $body}' | \
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.ensure_pr.outputs.pr_number }}/comments"
