name: Test and Junie PR Builder

# 1. Trigger on push (but ignore pushes directly to main so we only PR feature branches)
on:
  push:
    branches-ignore:
      - main

jobs:
  # --- JOB 1: Run your Python tests ---
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run pytest
        run: pytest

  # --- JOB 2: The Junie Agent ---
  junie-agent-review:
    # Wait for the tests to finish before starting Junie
    needs: test-backend

    # ONLY run if the commit message contains the tag.
    # 'always()' ensures Junie still runs even if the tests in Job 1 fail!
    if: |
      always() && 
      contains(github.event.head_commit.message, '@junie-agent')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read # Required for Junie to read the test logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so Junie can do a proper git diff

      # Create a Draft PR so Junie has an actual Pull Request to update and comment on
      - name: Create Draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --draft --title "Auto PR: ${{ github.event.head_commit.message }}" --body "Pending Junie analysis..." --head ${{ github.ref_name }} --base main || echo "PR already exists"

      # Hand over control to Junie
      - name: Run Junie Analysis
        uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          allowed_mcp_servers: "mcp_github_checks_server" # Turns on test-reading mode
          prompt: |
            You are managing the Pull Request for this branch. Please execute the following sequence:
            1. Perform a git diff between this branch and main.
            2. Update the Pull Request description with a detailed summary of the code changes.
            3. Use your checks server to analyze the outcome of the 'test-backend' job that just ran.
            4. If the tests passed: add a comment to the PR saying exactly "tests passed, ready for review".
            5. If the tests failed: add a comment explaining exactly where the tests failed, why they failed based on the logs, and suggest a fix. Do not mark the PR as ready for review.