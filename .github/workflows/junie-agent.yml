name: Junie PR Builder

on:
  workflow_run:
    workflows: ["Python Backend Tests"]
    types:
      - completed

jobs:
  junie-agent-review:
    # THE KILL SWITCH: Force stop if it hangs for more than 5 minutes
    timeout-minutes: 5

    # Only run if the commit message contains @junie-agent
    if: contains(github.event.workflow_run.head_commit.message, '@junie-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Create Draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --draft \
            --title "Auto PR: ${{ github.event.workflow_run.head_commit.message }}" \
            --body "Pending Junie analysis..." \
            --head ${{ github.event.workflow_run.head_branch }} \
            --base master || echo "PR already exists" 

      - name: Run Junie Analysis
        uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          allowed_mcp_servers: "mcp_github_checks_server,mcp_github_inline_comment_server"
          prompt: |
            You are managing the Pull Request for this branch. Please execute the following sequence:
            1. Perform a git diff between this branch and master.
            2. Update the Pull Request description with a detailed summary of the code changes.
            3. Use your checks server to analyze the outcome of the 'Python Backend Tests' workflow that just completed.
            4. If the tests passed: add a comment to the PR saying exactly "tests passed, ready for review".
            5. If the tests failed: add a comment explaining exactly where the tests failed, why they failed based on the logs, and suggest a fix. Do not mark the PR as ready for review.